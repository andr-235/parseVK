[tool.pytest.ini_options]
addopts = ["--import-mode=importlib", "-m", "not integration"]
asyncio_mode = "auto"
markers = ["integration: tests requiring Docker (testcontainers)"]
testpaths = [
  "libs/py/common/tests",
  "services/api-gateway/tests",
  "services/identity-service/tests",
  "services/tasks-service/tests",
  "services/vk-service/tests",
  "services/content-service/tests",
  "services/telegram-service/tests",
  "services/listings-service/tests",
  "services/moderation-service/tests",
  "services/im-service/tests",
]
pythonpath = [
  "libs/py/common",
]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".agents", ".codex", ".opencode"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC", "S"]
ignore = ["S101", "B008", "B017", "E402", "S105", "S106", "S107", "S110", "S310", "S608", "E501"]
per-file-ignores = {"tests/*" = ["S105", "S106"]}

[tool.ruff.lint.isort]
known-first-party = ["app"]
