name: Deploy to Production Server

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Debian Server
    runs-on: [self-hosted]
    timeout-minutes: 90
    permissions:
      contents: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      COMPOSE_FILE: docker-compose.yml
      PROJECT_ROOT: /opt/parseVK
      PRODUCTION_SCRIPTS_DIR: ${{ github.workspace }}/.github/scripts/production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Load deployment metadata
        id: deployment_metadata
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail
          PROJECT_ROOT="$PROJECT_ROOT" COMPOSE_FILE="$COMPOSE_FILE" GITHUB_OUTPUT="$GITHUB_OUTPUT" \
            bash "$PRODUCTION_SCRIPTS_DIR/metadata.sh" load

      - name: Determine deployment context
        id: deployment_context
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          if ! git remote get-url origin > /dev/null 2>&1; then
            echo "Error: Git remote 'origin' is not configured"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
            if ! git fetch --no-tags origin "$TARGET_SHA"; then
              echo "Error: Failed to fetch target commit $TARGET_SHA"
              exit 1
            fi

            COMMIT_MESSAGE=$(git log -1 --format=%B FETCH_HEAD)
            if printf '%s' "$COMMIT_MESSAGE" | grep -qF '[skip ci]'; then
              echo "skip_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "skip_deploy=false" >> $GITHUB_OUTPUT
            fi
          else
            if ! git fetch origin main; then
              echo "Error: Failed to fetch origin/main"
              exit 1
            fi

            TARGET_SHA=$(git rev-parse origin/main)
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

          echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "Selected target commit: $TARGET_SHA"

      - name: Update code
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        timeout-minutes: 5
        run: |
          set -euo pipefail

          echo "=== Updating code ==="
          TARGET_SHA="${{ steps.deployment_context.outputs.target_sha }}"

          if ! git fetch --no-tags origin "$TARGET_SHA"; then
            echo "Error: Failed to fetch target commit $TARGET_SHA"
            exit 1
          fi

          if ! git checkout -f "$TARGET_SHA"; then
            echo "Error: Failed to checkout commit $TARGET_SHA"
            exit 1
          fi

          git branch -f deployed "$TARGET_SHA"

          echo "Updated to commit: $(git rev-parse HEAD)"

      - name: Production preflight
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail
          PROJECT_ROOT="$PROJECT_ROOT" COMPOSE_FILE="$COMPOSE_FILE" \
            bash "$PRODUCTION_SCRIPTS_DIR/preflight.sh"

      - name: Detect changed services
        id: changed_services
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          PREV_COMMIT="${{ steps.deployment_metadata.outputs.last_successful_commit }}"
          CURRENT_COMMIT=$(git rev-parse HEAD)

            BUILD_FRONTEND=false
            BUILD_IDENTITY_SERVICE=false
            BUILD_TASKS_SERVICE=false
            BUILD_VK_SERVICE=false
            BUILD_CONTENT_SERVICE=false
            BUILD_MODERATION_SERVICE=false
            BUILD_TELEGRAM_SERVICE=false
            BUILD_API_GATEWAY=false
            BUILD_IM_SERVICE=false

          if [ -z "$PREV_COMMIT" ] || ! git cat-file -e "${PREV_COMMIT}^{commit}" 2>/dev/null; then
            BUILD_FRONTEND=true
            BUILD_IDENTITY_SERVICE=true
            BUILD_TASKS_SERVICE=true
            BUILD_VK_SERVICE=true
            BUILD_CONTENT_SERVICE=true
            BUILD_MODERATION_SERVICE=true
            BUILD_TELEGRAM_SERVICE=true
            BUILD_API_GATEWAY=true
            BUILD_IM_SERVICE=true
            echo "No previous deployed commit found, building all local images"
          else
            CHANGED_FILES=$(git diff --name-only "$PREV_COMMIT" "$CURRENT_COMMIT" || true)
            echo "Changed files since last successful deploy:"
            printf '%s\n' "$CHANGED_FILES"

            # Shared libs change triggers all services
            LIBS_CHANGED=false
            if printf '%s\n' "$CHANGED_FILES" | grep -qE '^libs/py/common/'; then
              LIBS_CHANGED=true
            fi

            if printf '%s\n' "$CHANGED_FILES" | grep -qE '^(front/|docker/frontend\.Dockerfile|docker/frontend\.nginx\.conf|docker/frontend-entrypoint\.sh|\.dockerignore)'; then
              BUILD_FRONTEND=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/api-gateway/'; then
              BUILD_API_GATEWAY=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/identity-service/'; then
              BUILD_IDENTITY_SERVICE=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/tasks-service/'; then
              BUILD_TASKS_SERVICE=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/vk-service/'; then
              BUILD_VK_SERVICE=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/content-service/'; then
              BUILD_CONTENT_SERVICE=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/moderation-service/'; then
              BUILD_MODERATION_SERVICE=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/telegram-service/'; then
              BUILD_TELEGRAM_SERVICE=true
            fi

            if [ "$LIBS_CHANGED" = "true" ] || printf '%s\n' "$CHANGED_FILES" | grep -qE '^services/im-service/'; then
              BUILD_IM_SERVICE=true
            fi
          fi

          echo "build_frontend=$BUILD_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "build_identity_service=$BUILD_IDENTITY_SERVICE" >> "$GITHUB_OUTPUT"
          echo "build_tasks_service=$BUILD_TASKS_SERVICE" >> "$GITHUB_OUTPUT"
          echo "build_vk_service=$BUILD_VK_SERVICE" >> "$GITHUB_OUTPUT"
          echo "build_content_service=$BUILD_CONTENT_SERVICE" >> "$GITHUB_OUTPUT"
          echo "build_moderation_service=$BUILD_MODERATION_SERVICE" >> "$GITHUB_OUTPUT"
          echo "build_telegram_service=$BUILD_TELEGRAM_SERVICE" >> "$GITHUB_OUTPUT"
          echo "build_api_gateway=$BUILD_API_GATEWAY" >> "$GITHUB_OUTPUT"
          echo "build_im_service=$BUILD_IM_SERVICE" >> "$GITHUB_OUTPUT"

      - name: Build and start containers
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        timeout-minutes: 30
        run: |
          set -euo pipefail
          SERVICES_TO_BUILD=""

          if [ "${{ steps.changed_services.outputs.build_frontend }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD frontend"
          fi

          if [ "${{ steps.changed_services.outputs.build_api_gateway }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD api-gateway"
          fi

          if [ "${{ steps.changed_services.outputs.build_identity_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD identity-service identity-migrate identity-seed-admin"
          fi

          if [ "${{ steps.changed_services.outputs.build_tasks_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD tasks-service tasks-migrate"
          fi

          if [ "${{ steps.changed_services.outputs.build_vk_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD vk-service vk-migrate"
          fi

          if [ "${{ steps.changed_services.outputs.build_content_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD content-service content-migrate"
          fi

          if [ "${{ steps.changed_services.outputs.build_moderation_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD moderation-service moderation-migrate"
          fi

          if [ "${{ steps.changed_services.outputs.build_telegram_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD telegram-service"
          fi

          if [ "${{ steps.changed_services.outputs.build_im_service }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD im-service im-migrate"
          fi

          if [ -n "$SERVICES_TO_BUILD" ]; then
            PROJECT_ROOT="$PROJECT_ROOT" COMPOSE_FILE="$COMPOSE_FILE" \
              bash "$PRODUCTION_SCRIPTS_DIR/images.sh" prepare $SERVICES_TO_BUILD
            PROJECT_ROOT="$PROJECT_ROOT" COMPOSE_FILE="$COMPOSE_FILE" \
              bash "$PRODUCTION_SCRIPTS_DIR/images.sh" build $SERVICES_TO_BUILD
            UP_ARGS="-d"
          else
            UP_ARGS="-d --no-build"
          fi

          PROJECT_ROOT="$PROJECT_ROOT" COMPOSE_FILE="$COMPOSE_FILE" UP_ARGS="$UP_ARGS" \
            bash "$PRODUCTION_SCRIPTS_DIR/release.sh"

      - name: Update deployment metadata
        if: success() && steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          CURRENT_COMMIT=$(git rev-parse HEAD)
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PROJECT_ROOT="$PROJECT_ROOT" COMPOSE_FILE="$COMPOSE_FILE" \
            bash "$PRODUCTION_SCRIPTS_DIR/metadata.sh" write "$CURRENT_COMMIT" "$CURRENT_TIME"

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ steps.deployment_context.outputs.skip_deploy }}" == "true" ]; then
            echo "⏭️ Deployment skipped for release commit"
            echo "Commit: ${{ steps.deployment_context.outputs.target_sha }}"
          elif [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Commit: $(cd /opt/parseVK && git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
          else
            echo "❌ Deployment failed!"
            echo "Commit: $(cd /opt/parseVK && git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
          fi
