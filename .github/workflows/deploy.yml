name: Deploy to Production Server

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Debian Server
    runs-on: [self-hosted]
    timeout-minutes: 90
    permissions:
      contents: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      COMPOSE_FILE: docker-compose.deploy.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Load deployment metadata
        id: deployment_metadata
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          METADATA_FILE="/opt/parseVK/.deployment-metadata.json"
          LAST_SUCCESSFUL_COMMIT=""

          if [ -f "$METADATA_FILE" ]; then
            LAST_SUCCESSFUL_COMMIT=$(jq -r '.last_successful_commit // empty' "$METADATA_FILE" 2>/dev/null || echo "")
          fi

          echo "last_successful_commit=$LAST_SUCCESSFUL_COMMIT" >> $GITHUB_OUTPUT

      - name: Determine deployment context
        id: deployment_context
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          if ! git remote get-url origin > /dev/null 2>&1; then
            echo "Error: Git remote 'origin' is not configured"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
            if ! git fetch --no-tags origin "$TARGET_SHA"; then
              echo "Error: Failed to fetch target commit $TARGET_SHA"
              exit 1
            fi

            COMMIT_MESSAGE=$(git log -1 --format=%B FETCH_HEAD)
            if printf '%s' "$COMMIT_MESSAGE" | grep -qF '[skip ci]'; then
              echo "skip_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "skip_deploy=false" >> $GITHUB_OUTPUT
            fi
          else
            if ! git fetch origin main; then
              echo "Error: Failed to fetch origin/main"
              exit 1
            fi

            TARGET_SHA=$(git rev-parse origin/main)
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

          echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "Selected target commit: $TARGET_SHA"

      - name: Update code
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        timeout-minutes: 5
        run: |
          set -euo pipefail

          echo "=== Updating code ==="
          TARGET_SHA="${{ steps.deployment_context.outputs.target_sha }}"

          if ! git fetch --no-tags origin "$TARGET_SHA"; then
            echo "Error: Failed to fetch target commit $TARGET_SHA"
            exit 1
          fi

          if ! git checkout -f "$TARGET_SHA"; then
            echo "Error: Failed to checkout commit $TARGET_SHA"
            exit 1
          fi

          git branch -f deployed "$TARGET_SHA"

          echo "Updated to commit: $(git rev-parse HEAD)"

      - name: Check for migrations
        id: check_migrations
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          PREV_COMMIT="${{ steps.deployment_metadata.outputs.last_successful_commit }}"
          CURRENT_COMMIT=$(git rev-parse HEAD)

          if [ -z "$PREV_COMMIT" ] || ! git cat-file -e "${PREV_COMMIT}^{commit}" 2>/dev/null; then
            echo "needs_migrations=true" >> $GITHUB_OUTPUT
            echo "No previous deployed commit found, will run migrations"
          else
            CHANGED_FILES=$(git diff --name-only "$PREV_COMMIT" "$CURRENT_COMMIT" || true)
            if echo "$CHANGED_FILES" | grep -qE '^api/|^prisma/'; then
              echo "needs_migrations=true" >> $GITHUB_OUTPUT
              echo "API or Prisma files changed, migrations needed"
            else
              echo "needs_migrations=false" >> $GITHUB_OUTPUT
              echo "No API or Prisma changes, skipping migrations"
            fi
          fi

      - name: Detect changed services
        id: changed_services
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          PREV_COMMIT="${{ steps.deployment_metadata.outputs.last_successful_commit }}"
          CURRENT_COMMIT=$(git rev-parse HEAD)

          BUILD_API=false
          BUILD_FRONTEND=false
          BUILD_DB_BACKUP=false

          if [ -z "$PREV_COMMIT" ] || ! git cat-file -e "${PREV_COMMIT}^{commit}" 2>/dev/null; then
            BUILD_API=true
            BUILD_FRONTEND=true
            BUILD_DB_BACKUP=true
            echo "No previous deployed commit found, building all local images"
          else
            CHANGED_FILES=$(git diff --name-only "$PREV_COMMIT" "$CURRENT_COMMIT" || true)
            echo "Changed files since last successful deploy:"
            printf '%s\n' "$CHANGED_FILES"

            if printf '%s\n' "$CHANGED_FILES" | grep -qE '^(api/|docker/backend\.Dockerfile|docker/backend-entrypoint\.sh|docker/backend-healthcheck\.mjs|docker-compose\.deploy\.yml|\.dockerignore)'; then
              BUILD_API=true
            fi

            if printf '%s\n' "$CHANGED_FILES" | grep -qE '^(front/|docker/frontend\.Dockerfile|docker/frontend\.nginx\.conf|docker/frontend-entrypoint\.sh|docker-compose\.deploy\.yml|\.dockerignore)'; then
              BUILD_FRONTEND=true
            fi

            if printf '%s\n' "$CHANGED_FILES" | grep -qE '^(docker/db-backup/|docker-compose\.deploy\.yml|\.dockerignore)'; then
              BUILD_DB_BACKUP=true
            fi
          fi

          echo "build_api=$BUILD_API" >> "$GITHUB_OUTPUT"
          echo "build_frontend=$BUILD_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "build_db_backup=$BUILD_DB_BACKUP" >> "$GITHUB_OUTPUT"

      - name: Start database and dependencies
        working-directory: /opt/parseVK
        timeout-minutes: 5
        if: steps.deployment_context.outputs.skip_deploy != 'true' && steps.check_migrations.outputs.needs_migrations == 'true'
        run: |
          echo "=== Starting database and dependencies ==="

          docker compose -f "$COMPOSE_FILE" up -d db redis

          echo "=== Waiting for database to be ready ==="
          MAX_WAIT=60
          WAIT_COUNT=0
          while [ $WAIT_COUNT -lt $MAX_WAIT ]; do
            if docker compose -f "$COMPOSE_FILE" exec -T db pg_isready -U postgres -d vk_api > /dev/null 2>&1; then
              echo "Database is ready"
              break
            fi
            echo "Waiting for database... ($WAIT_COUNT/$MAX_WAIT)"
            sleep 1
            WAIT_COUNT=$((WAIT_COUNT + 1))
          done

          if [ $WAIT_COUNT -eq $MAX_WAIT ]; then
            echo "Error: Database did not become ready in time"
            docker compose -f "$COMPOSE_FILE" logs db
            exit 1
          fi

      - name: Prepare API image for migrations
        id: prepare_api_image
        working-directory: /opt/parseVK
        timeout-minutes: 20
        if: steps.deployment_context.outputs.skip_deploy != 'true' && steps.check_migrations.outputs.needs_migrations == 'true'
        run: |
          set -euo pipefail
          source .github/scripts/log-helper.sh

          API_IMAGE_TAG="parsevk-api:local"
          IMAGE_EXISTS=false

          if docker image inspect "$API_IMAGE_TAG" > /dev/null 2>&1; then
            IMAGE_EXISTS=true
          fi

          if [ "${{ steps.changed_services.outputs.build_api }}" = "true" ] || [ "$IMAGE_EXISTS" != "true" ]; then
            log_info "Подготавливаю образ API для миграций"
            retry_with_backoff 2 10 "timeout 1200s docker compose -f \"$COMPOSE_FILE\" build --progress plain api"
            echo "api_prebuilt_for_migrations=true" >> "$GITHUB_OUTPUT"
          else
            log_info "Использую существующий локальный образ API для миграций"
            echo "api_prebuilt_for_migrations=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run database migrations
        working-directory: /opt/parseVK
        timeout-minutes: 5
        if: steps.deployment_context.outputs.skip_deploy != 'true' && steps.check_migrations.outputs.needs_migrations == 'true'
        run: |
          echo "=== Running database migrations ==="

          if docker compose -f "$COMPOSE_FILE" run --rm --no-deps --entrypoint sh api -c "command -v ./node_modules/.bin/prisma > /dev/null 2>&1 && ./node_modules/.bin/prisma migrate deploy || prisma migrate deploy"; then
            echo "Migrations completed"
          else
            echo "Error: Migrations failed"
            docker compose -f "$COMPOSE_FILE" logs --tail=100 api
            docker compose -f "$COMPOSE_FILE" logs --tail=100 db
            exit 1
          fi

      - name: Build and start containers
        if: steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        timeout-minutes: 30
        run: |
          set -euo pipefail
          source .github/scripts/log-helper.sh

          log_info "=== Сборка и запуск контейнеров ==="
          log_info "Docker version: $(docker --version)"
          log_info "Docker Compose version: $(docker compose version)"

          SERVICES_TO_BUILD=""

          if [ "${{ steps.changed_services.outputs.build_api }}" = "true" ] && [ "${{ steps.prepare_api_image.outputs.api_prebuilt_for_migrations }}" != "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD api"
          fi

          if [ "${{ steps.changed_services.outputs.build_frontend }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD frontend"
          fi

          if [ "${{ steps.changed_services.outputs.build_db_backup }}" = "true" ]; then
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD db_backup"
          fi

          if [ -n "$SERVICES_TO_BUILD" ]; then
            log_info "Собираю изменённые сервисы:$SERVICES_TO_BUILD"
            retry_with_backoff 2 10 "timeout 1200s docker compose -f \"$COMPOSE_FILE\" build --progress plain $SERVICES_TO_BUILD"
            UP_ARGS="-d"
          else
            log_info "Изменений в образах нет, пропускаю build"
            UP_ARGS="-d --no-build"
          fi

          if docker compose -f "$COMPOSE_FILE" up $UP_ARGS; then
            echo "Containers started successfully"
          else
            echo "Error: Failed to start containers"
            docker compose -f "$COMPOSE_FILE" logs --tail=50
            exit 1
          fi

          echo "=== Container status ==="
          docker compose -f "$COMPOSE_FILE" ps

      - name: Update deployment metadata
        if: success() && steps.deployment_context.outputs.skip_deploy != 'true'
        working-directory: /opt/parseVK
        run: |
          set -euo pipefail

          METADATA_FILE="/opt/parseVK/.deployment-metadata.json"
          CURRENT_COMMIT=$(git rev-parse HEAD)
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -f "$METADATA_FILE" ]; then
            jq --arg commit "$CURRENT_COMMIT" \
               --arg time "$CURRENT_TIME" \
               '.last_successful_commit = $commit | .last_successful_deploy_time = $time' \
               "$METADATA_FILE" > "${METADATA_FILE}.tmp" && \
            mv "${METADATA_FILE}.tmp" "$METADATA_FILE"
          else
            cat > "$METADATA_FILE" <<EOF
          {
            "last_successful_commit": "$CURRENT_COMMIT",
            "last_successful_deploy_time": "$CURRENT_TIME"
          }
          EOF
          fi

          echo "Updated deployment metadata"

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ steps.deployment_context.outputs.skip_deploy }}" == "true" ]; then
            echo "⏭️ Deployment skipped for release commit"
            echo "Commit: ${{ steps.deployment_context.outputs.target_sha }}"
          elif [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Commit: $(cd /opt/parseVK && git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
          else
            echo "❌ Deployment failed!"
            echo "Commit: $(cd /opt/parseVK && git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
          fi
