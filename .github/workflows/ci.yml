name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      python_changed: ${{ steps.detect.outputs.python_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          FRONTEND_CHANGED=false
          PYTHON_CHANGED=false

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base commit not found; treating as full change set"
            FRONTEND_CHANGED=true
            PYTHON_CHANGED=true
          else
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No changed files detected"
            else
              echo "Changed files:"
              echo "$CHANGED_FILES"
            fi

            if echo "$CHANGED_FILES" | grep -qE '^front/'; then
              FRONTEND_CHANGED=true
            fi

            if echo "$CHANGED_FILES" | grep -qE '^(services/|libs/py/common/|pyproject\.toml)'; then
              PYTHON_CHANGED=true
            fi
          fi

          echo "frontend_changed=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "python_changed=$PYTHON_CHANGED" >> $GITHUB_OUTPUT

  lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: front
        run: bun install --frozen-lockfile
      - name: Run linter
        working-directory: front
        run: bun run lint

  typecheck:
    name: Typecheck Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: front
        run: bun install --frozen-lockfile
      - name: Run typecheck
        working-directory: front
        run: bun run build

  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run ruff check on all Python sources
        run: uvx ruff check --output-format=github services/ libs/

  frontend-tests:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: front
        run: bun install --frozen-lockfile
      - name: Run tests
        working-directory: front
        run: bun run test

  pytest-libs:
    name: Test common lib
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: libs/py/common
        run: uv sync --group dev
      - name: Run tests
        working-directory: libs/py/common
        run: uv run pytest -v

  pytest-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - identity-service
          - tasks-service
          - vk-service
          - content-service
          - telegram-service
          - listings-service
          - moderation-service
          - im-service
    env:
      PYTHONPATH: ${{ github.workspace }}/libs/py/common
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: uv sync --group test
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: uv run pytest -v
