name: CI

on:
  pull_request:
    branches: [main, fastapi-microservices-rewrite]
  push:
    branches: [main, fastapi-microservices-rewrite]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.detect.outputs.frontend }}
      python: ${{ steps.detect.outputs.python }}
      go_cli: ${{ steps.detect.outputs.go_cli }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          frontend=false
          python=false
          go_cli=false

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            frontend=true
            python=true
            go_cli=true
          elif git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
            echo "$CHANGED" | grep -qE '^front/' && frontend=true
            echo "$CHANGED" | grep -qE '^(services/|libs/py/|pyproject\.toml|uv\.lock)' && python=true
            echo "$CHANGED" | grep -qE '^tools/parsevkctl-go/' && go_cli=true
          else
            frontend=true
            python=true
            go_cli=true
          fi

          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "go_cli=$go_cli" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build
      - run: bun run test

  python-lint:
    name: Python lint
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
      - uses: astral-sh/ruff-action@v3

  python-test:
    name: Python test (${{ matrix.service }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - common
          - api-gateway
          - identity-service
          - tasks-service
          - vk-service
          - content-service
          - moderation-service
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run tests
        run: |
          set -euo pipefail
          case "${{ matrix.service }}" in
            common)
              DIR="libs/py/common"
              uv sync --directory "$DIR"
              uv run --directory "$DIR" --with pytest --with pytest-asyncio pytest tests/ -v
              ;;
            *)
              DIR="services/${{ matrix.service }}"
              uv sync --directory "$DIR" --extra test
              uv run --directory "$DIR" pytest tests/ -v
              ;;
          esac

  go:
    name: Go CLI
    needs: changes
    if: needs.changes.outputs.go_cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/parsevkctl-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/parsevkctl-go/go.mod
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
