name: Feature
description: Request a new capability
title: "[feature] "
labels: ["feature"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      placeholder: Why is this feature needed?
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Desired behavior
      placeholder: What should the system do?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      value: |
        In scope:
        - 

        Out of scope:
        -
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
    validations:
      required: false
