x-api-build: &api-build
  context: ./api
  dockerfile: Dockerfile.deploy
  args:
    DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    NPM_REGISTRY_FALLBACK: ${NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org/}

x-api-environment: &api-environment
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  TGMBASE_DATABASE_URL: ${TGMBASE_DATABASE_URL:-postgresql://postgres:postgres@db:5432/tgmbase?schema=public}
  MONITOR_DATABASE_URL: ${MONITOR_DATABASE_URL:-}

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vk_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  identity-db:
    image: postgres:15-alpine
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: ${IDENTITY_POSTGRES_USER:-identity}
      POSTGRES_PASSWORD: ${IDENTITY_POSTGRES_PASSWORD:-identity}
      POSTGRES_DB: ${IDENTITY_POSTGRES_DB:-identity}
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  kafka:
    image: apache/kafka:4.1.0
    profiles:
      - kafka
    restart: always
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - default

  identity-migrate:
    image: parsevk-identity-service:local
    pull_policy: never
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: "no"
    depends_on:
      identity-db:
        condition: service_healthy
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://${IDENTITY_POSTGRES_USER:-identity}:${IDENTITY_POSTGRES_PASSWORD:-identity}@identity-db:5432/${IDENTITY_POSTGRES_DB:-identity}
    command: ["alembic", "upgrade", "head"]
    networks:
      - default

  identity-seed-admin:
    image: parsevk-identity-service:local
    pull_policy: never
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: "no"
    depends_on:
      identity-migrate:
        condition: service_completed_successfully
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://${IDENTITY_POSTGRES_USER:-identity}:${IDENTITY_POSTGRES_PASSWORD:-identity}@identity-db:5432/${IDENTITY_POSTGRES_DB:-identity}
      IDENTITY_ADMIN_USERNAME: ${IDENTITY_ADMIN_USERNAME:-admin}
      IDENTITY_ADMIN_PASSWORD: ${IDENTITY_ADMIN_PASSWORD:-admin-change-me}
      IDENTITY_ADMIN_EMAIL: ${IDENTITY_ADMIN_EMAIL:-}
    command: ["python", "-m", "app.cli"]
    networks:
      - default

  identity-service:
    image: parsevk-identity-service:local
    pull_policy: never
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: always
    depends_on:
      identity-seed-admin:
        condition: service_completed_successfully
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://${IDENTITY_POSTGRES_USER:-identity}:${IDENTITY_POSTGRES_PASSWORD:-identity}@identity-db:5432/${IDENTITY_POSTGRES_DB:-identity}
      IDENTITY_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      IDENTITY_ADMIN_USERNAME: ${IDENTITY_ADMIN_USERNAME:-admin}
      IDENTITY_ADMIN_PASSWORD: ${IDENTITY_ADMIN_PASSWORD:-admin-change-me}
      IDENTITY_ADMIN_EMAIL: ${IDENTITY_ADMIN_EMAIL:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  api-gateway:
    image: parsevk-api-gateway:local
    pull_policy: never
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3002:8000"
    depends_on:
      identity-service:
        condition: service_healthy
    environment:
      GATEWAY_IDENTITY_BASE_URL: http://identity-service:8000
      GATEWAY_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      GATEWAY_REFRESH_COOKIE_NAME: ${GATEWAY_REFRESH_COOKIE_NAME:-refresh_token}
      GATEWAY_CSRF_COOKIE_NAME: ${GATEWAY_CSRF_COOKIE_NAME:-csrf_token}
      GATEWAY_REFRESH_COOKIE_SECURE: ${GATEWAY_REFRESH_COOKIE_SECURE:-false}
      GATEWAY_REFRESH_COOKIE_SAMESITE: ${GATEWAY_REFRESH_COOKIE_SAMESITE:-lax}
      GATEWAY_ALLOWED_ORIGINS: '${GATEWAY_ALLOWED_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8080"]}'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  db_backup:
    image: parsevk-db-backup:local
    pull_policy: never
    build:
      context: docker/db-backup
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_SCHEDULE: "0 3 * * *"
    volumes:
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h db -U postgres -d vk_api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

  api:
    image: parsevk-api:local
    pull_policy: never
    build: *api-build
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment: *api-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - monitor_net
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  api-migrate:
    image: parsevk-api:local
    pull_policy: never
    build: *api-build
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment: *api-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/app/run-migrations.sh"]
    networks:
      - default
      - monitor_net

  frontend:
    image: parsevk-frontend:local
    pull_policy: never
    build:
      context: ./front
      dockerfile: Dockerfile.deploy
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Центр аналитики}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GATEWAY_API_URL: ${VITE_GATEWAY_API_URL:-/api}
        VITE_API_WS_URL: ${VITE_API_WS_URL:-auto}
        VITE_DEV_MODE: ${VITE_DEV_MODE:-false}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        NPM_REGISTRY_FALLBACK: ${NPM_REGISTRY_FALLBACK:-https://registry.npmjs.org/}
    restart: always
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    environment:
      API_URL: http://api:3000
      GATEWAY_API_URL: http://api-gateway:8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  prometheus:
    image: prom/prometheus:latest
    # Keep Prometheus running after failures or host restarts.
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    # Healthcheck is used by Grafana dependency and for readiness visibility.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
    # Ensure Prometheus starts after API is healthy and exporter is available.
    depends_on:
      api:
        condition: service_healthy
      node-exporter:
        condition: service_started

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    # Keep Grafana running after failures or host restarts.
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - default
    # Wait for Prometheus to become healthy before Grafana starts.
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  postgres_data:
    external: true
    name: parsevk_postgres_data
  postgres_backups:
    name: parsevk_postgres_backups
  identity_postgres_data:
    name: parsevk_identity_postgres_data
  prometheus_data:
    name: parsevk_prometheus_data
  grafana_data:
    name: parsevk_grafana_data

networks:
  default:
  monitor_net:
    external: true
    name: monitor_whatsapp_max_default
