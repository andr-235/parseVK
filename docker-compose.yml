name: parsevk

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-resources-app: &resources-app
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
        pids: 100
      reservations:
        cpus: "0.25"
        memory: 128M

x-resources-db: &resources-db
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 1G
        pids: 200
      reservations:
        cpus: "0.5"
        memory: 256M

x-resources-redis: &resources-redis
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
        pids: 50
      reservations:
        cpus: "0.25"
        memory: 64M

x-resources-kafka: &resources-kafka
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1G
        pids: 200
      reservations:
        cpus: "0.5"
        memory: 512M

x-resources-mon: &resources-mon
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
        pids: 100
      reservations:
        cpus: "0.25"
        memory: 128M

services:
  db:
    image: postgres:16.14
    restart: always
    # Порт закрыт наружу, доступ только внутри сети Docker
    # ports:
    #   - "127.0.0.1:5433:5432"  # Раскомментируй только для локальной отладки
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vk_api}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    <<: *resources-db
    networks:
      - backend

  redis:
    image: redis:7.4.9-alpine
    restart: always
    # Порт закрыт наружу
    # ports:
    #   - "127.0.0.1:6379:6379"  # Раскомментируй только для локальной отладки
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    <<: *resources-redis
    networks:
      - backend

  identity-db:
    image: postgres:16.14
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: ${IDENTITY_POSTGRES_USER:-identity}
      POSTGRES_PASSWORD: ${IDENTITY_POSTGRES_PASSWORD:-identity}
      POSTGRES_DB: ${IDENTITY_POSTGRES_DB:-identity}
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  kafka:
    image: apache/kafka:4.1.0
    restart: always
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - backend

  kafka-init:
    image: apache/kafka:4.1.0
    restart: "no"
    depends_on:
      kafka:
        condition: service_started
    command: >
      /bin/sh -c "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do sleep 2; done;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic parsevk.tasks.events --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic parsevk.vk.events --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic parsevk.im.events --partitions 1 --replication-factor 1
      "
    networks:
      - backend

  identity-migrate:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: "no"
    depends_on:
      identity-db:
        condition: service_healthy
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://${IDENTITY_POSTGRES_USER:-identity}:${IDENTITY_POSTGRES_PASSWORD:-identity}@identity-db:5432/${IDENTITY_POSTGRES_DB:-identity}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend

  identity-seed-admin:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: "no"
    depends_on:
      identity-migrate:
        condition: service_completed_successfully
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://${IDENTITY_POSTGRES_USER:-identity}:${IDENTITY_POSTGRES_PASSWORD:-identity}@identity-db:5432/${IDENTITY_POSTGRES_DB:-identity}
      IDENTITY_ADMIN_USERNAME: ${IDENTITY_ADMIN_USERNAME:-admin}
      IDENTITY_ADMIN_PASSWORD: ${IDENTITY_ADMIN_PASSWORD:-admin-change-me}
      IDENTITY_ADMIN_EMAIL: ${IDENTITY_ADMIN_EMAIL:-}
    command: ["python", "-m", "app.cli"]
    networks:
      - backend

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    restart: always
    depends_on:
      identity-seed-admin:
        condition: service_completed_successfully
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://${IDENTITY_POSTGRES_USER:-identity}:${IDENTITY_POSTGRES_PASSWORD:-identity}@identity-db:5432/${IDENTITY_POSTGRES_DB:-identity}
      IDENTITY_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      IDENTITY_ADMIN_USERNAME: ${IDENTITY_ADMIN_USERNAME:-admin}
      IDENTITY_ADMIN_PASSWORD: ${IDENTITY_ADMIN_PASSWORD:-admin-change-me}
      IDENTITY_ADMIN_EMAIL: ${IDENTITY_ADMIN_EMAIL:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  tasks-db:
    image: postgres:16.14
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_USER: ${TASKS_POSTGRES_USER:-tasks}
      POSTGRES_PASSWORD: ${TASKS_POSTGRES_PASSWORD:-tasks}
      POSTGRES_DB: ${TASKS_POSTGRES_DB:-tasks}
    volumes:
      - tasks_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  tasks-migrate:
    build:
      context: .
      dockerfile: services/tasks-service/Dockerfile
    restart: "no"
    depends_on:
      tasks-db:
        condition: service_healthy
    environment:
      TASKS_DATABASE_URL: postgresql+asyncpg://${TASKS_POSTGRES_USER:-tasks}:${TASKS_POSTGRES_PASSWORD:-tasks}@tasks-db:5432/${TASKS_POSTGRES_DB:-tasks}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend

  tasks-service:
    build:
      context: .
      dockerfile: services/tasks-service/Dockerfile
    restart: always
    depends_on:
      tasks-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      TASKS_DATABASE_URL: postgresql+asyncpg://${TASKS_POSTGRES_USER:-tasks}:${TASKS_POSTGRES_PASSWORD:-tasks}@tasks-db:5432/${TASKS_POSTGRES_DB:-tasks}
      TASKS_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      TASKS_OUTBOX_PUBLISH_ENABLED: ${TASKS_OUTBOX_PUBLISH_ENABLED:-true}
      TASKS_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  vk-db:
    image: postgres:16.14
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5436:5432"
    environment:
      POSTGRES_USER: ${VK_SERVICE_POSTGRES_USER:-vk}
      POSTGRES_PASSWORD: ${VK_SERVICE_POSTGRES_PASSWORD:-vk_dev_password_change_me}
      POSTGRES_DB: ${VK_SERVICE_POSTGRES_DB:-vk}
    volumes:
      - vk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  vk-migrate:
    build:
      context: .
      dockerfile: services/vk-service/Dockerfile
    restart: "no"
    depends_on:
      vk-db:
        condition: service_healthy
    environment:
      VK_SERVICE_DATABASE_URL: ${VK_SERVICE_DATABASE_URL:-postgresql+asyncpg://vk:vk_dev_password_change_me@vk-db:5432/vk}
      VK_SERVICE_VK_TOKEN: ${VK_SERVICE_VK_TOKEN:-${VK_TOKEN:-dev-vk-token}}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend

  vk-service:
    build:
      context: .
      dockerfile: services/vk-service/Dockerfile
    restart: always
    depends_on:
      vk-migrate:
        condition: service_completed_successfully
      tasks-service:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      VK_SERVICE_DATABASE_URL: ${VK_SERVICE_DATABASE_URL:-postgresql+asyncpg://vk:vk_dev_password_change_me@vk-db:5432/vk}
      VK_SERVICE_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      VK_SERVICE_TASKS_BASE_URL: http://tasks-service:8000
      VK_SERVICE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      VK_SERVICE_KAFKA_CONSUMER_ENABLED: ${VK_SERVICE_KAFKA_CONSUMER_ENABLED:-true}
      VK_SERVICE_OUTBOX_PUBLISH_ENABLED: ${VK_SERVICE_OUTBOX_PUBLISH_ENABLED:-true}
      VK_SERVICE_DEFAULT_GROUP_IDS: '${VK_SERVICE_DEFAULT_GROUP_IDS:-[1]}'
      VK_SERVICE_VK_TOKEN: ${VK_SERVICE_VK_TOKEN:-${VK_TOKEN:-}}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  content-db:
    image: postgres:16.14
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5437:5432"
    environment:
      POSTGRES_USER: ${CONTENT_POSTGRES_USER:-content}
      POSTGRES_PASSWORD: ${CONTENT_POSTGRES_PASSWORD:-content_dev_password_change_me}
      POSTGRES_DB: ${CONTENT_POSTGRES_DB:-content}
    volumes:
      - content_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  content-migrate:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    restart: "no"
    depends_on:
      content-db:
        condition: service_healthy
    environment:
      CONTENT_DATABASE_URL: ${CONTENT_DATABASE_URL:-postgresql+asyncpg://content:content_dev_password_change_me@content-db:5432/content}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend

  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    restart: always
    depends_on:
      content-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      CONTENT_DATABASE_URL: ${CONTENT_DATABASE_URL:-postgresql+asyncpg://content:content_dev_password_change_me@content-db:5432/content}
      CONTENT_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      CONTENT_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONTENT_KAFKA_CONSUMER_ENABLED: ${CONTENT_KAFKA_CONSUMER_ENABLED:-true}
      CONTENT_KAFKA_TOPIC_IM: ${CONTENT_KAFKA_TOPIC_IM:-parsevk.im.events}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  moderation-db:
    image: postgres:16.14
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5438:5432"
    environment:
      POSTGRES_USER: ${MODERATION_POSTGRES_USER:-moderation}
      POSTGRES_PASSWORD: ${MODERATION_POSTGRES_PASSWORD:-moderation_dev_password_change_me}
      POSTGRES_DB: ${MODERATION_POSTGRES_DB:-moderation}
    volumes:
      - moderation_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  moderation-migrate:
    build:
      context: .
      dockerfile: services/moderation-service/Dockerfile
    restart: "no"
    depends_on:
      moderation-db:
        condition: service_healthy
    environment:
      MODERATION_DATABASE_URL: ${MODERATION_DATABASE_URL:-postgresql+asyncpg://moderation:moderation_dev_password_change_me@moderation-db:5432/moderation}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend

  moderation-service:
    build:
      context: .
      dockerfile: services/moderation-service/Dockerfile
    restart: always
    depends_on:
      moderation-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      MODERATION_DATABASE_URL: ${MODERATION_DATABASE_URL:-postgresql+asyncpg://moderation:moderation_dev_password_change_me@moderation-db:5432/moderation}
      MODERATION_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      MODERATION_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MODERATION_KAFKA_CONSUMER_ENABLED: ${MODERATION_KAFKA_CONSUMER_ENABLED:-true}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  telegram-service:
    build:
      context: .
      dockerfile: services/telegram-service/Dockerfile
    restart: always
    environment:
      TELEGRAM_SERVICE_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      VPN_SERVICE_TELEGRAM_URL: ${VPN_SERVICE_TELEGRAM_URL:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  api-gateway:

    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3002:8000"
    depends_on:
      identity-service:
        condition: service_healthy
      tasks-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      moderation-service:
        condition: service_healthy
      telegram-service:
        condition: service_healthy
    environment:
      GATEWAY_IDENTITY_BASE_URL: http://identity-service:8000
      GATEWAY_TASKS_BASE_URL: http://tasks-service:8000
      GATEWAY_CONTENT_BASE_URL: http://content-service:8000
      GATEWAY_MODERATION_BASE_URL: http://moderation-service:8000
      GATEWAY_TELEGRAM_SERVICE_BASE_URL: http://telegram-service:8000
      GATEWAY_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}

      GATEWAY_REFRESH_COOKIE_NAME: ${GATEWAY_REFRESH_COOKIE_NAME:-refresh_token}
      GATEWAY_CSRF_COOKIE_NAME: ${GATEWAY_CSRF_COOKIE_NAME:-csrf_token}
      GATEWAY_REFRESH_COOKIE_SECURE: ${GATEWAY_REFRESH_COOKIE_SECURE:-false}
      GATEWAY_REFRESH_COOKIE_SAMESITE: ${GATEWAY_REFRESH_COOKIE_SAMESITE:-lax}
      GATEWAY_ALLOWED_ORIGINS: '${GATEWAY_ALLOWED_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8080"]}'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
      - frontend

  db_backup:
    build:
      context: ./docker/db-backup
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-vk_api}
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_SCHEDULE: "0 3 * * *"
    volumes:
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h db -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    <<: *resources-app
    networks:
      - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      API_URL: http://api-gateway:8000
      GATEWAY_API_URL: http://api-gateway:8000
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    <<: *resources-app
    networks:
      - frontend

  prometheus:
    image: prom/prometheus:v3.11.3
    ports:
      - "127.0.0.1:9090:9090"  # Доступ только локально
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    logging: *default-logging
    <<: *resources-mon
    networks:
      - backend
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.11.1
    # Порт закрыт наружу
    # ports:
    #   - "9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    logging: *default-logging
    <<: *resources-mon
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:13.0.1-security-01
    ports:
      - "127.0.0.1:3001:3000"  # Доступ только локально
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_ANGULAR_SUPPORT_DISABLED=true
    logging: *default-logging
    <<: *resources-mon
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_started

  im-db:
    image: postgres:16.14
    platform: linux/amd64
    restart: always
    ports:
      - "127.0.0.1:5441:5432"
    environment:
      POSTGRES_USER: ${IM_POSTGRES_USER:-im}
      POSTGRES_PASSWORD: ${IM_POSTGRES_PASSWORD:-im_dev_password_change_me}
      POSTGRES_DB: ${IM_POSTGRES_DB:-im}
    volumes:
      - im_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  im-migrate:
    build:
      context: .
      dockerfile: services/im-service/Dockerfile
    restart: "no"
    depends_on:
      im-db:
        condition: service_healthy
    environment:
      IM_SERVICE_DATABASE_URL: ${IM_SERVICE_DATABASE_URL:-postgresql+asyncpg://im:im_dev_password_change_me@im-db:5432/im}
    command: ["alembic", "upgrade", "head"]
    networks:
      - backend

  im-service:
    build:
      context: .
      dockerfile: services/im-service/Dockerfile
    restart: always
    depends_on:
      im-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      IM_SERVICE_DATABASE_URL: ${IM_SERVICE_DATABASE_URL:-postgresql+asyncpg://im:im_dev_password_change_me@im-db:5432/im}
      IM_SERVICE_INTERNAL_SERVICE_TOKEN: ${FASTAPI_INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      IM_SERVICE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IM_SERVICE_KAFKA_CONSUMER_ENABLED: ${IM_SERVICE_KAFKA_CONSUMER_ENABLED:-true}
      IM_SERVICE_OUTBOX_PUBLISH_ENABLED: ${IM_SERVICE_OUTBOX_PUBLISH_ENABLED:-true}
      IM_SERVICE_WAPPI_API_URL: ${WAPPI_API_URL:-https://wappi.pro}
      IM_SERVICE_WAPPI_API_TOKEN: ${WAPPI_API_TOKEN}
      IM_SERVICE_WAPPI_PROFILE_ID: ${WAPPI_PROFILE_ID}
      IM_SERVICE_WAPPI_POLL_INTERVAL: ${WAPPI_POLL_INTERVAL:-600}
      IM_SERVICE_WAPPI_REQUEST_TIMEOUT: ${WAPPI_REQUEST_TIMEOUT:-30}
      IM_SERVICE_WAPPI_PAGE_SIZE: ${WAPPI_PAGE_SIZE:-100}
      IM_SERVICE_WAPPI_INCLUDE_SYSTEM_MESSAGES: ${WAPPI_INCLUDE_SYSTEM_MESSAGES:-true}
      IM_SERVICE_MAX_PROFILE_ID: ${MAX_PROFILE_ID}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
    external: true
    name: parsevk_postgres_data
  postgres_backups:
    name: parsevk_postgres_backups
  identity_postgres_data:
    name: parsevk_identity_postgres_data
  tasks_postgres_data:
    name: parsevk_tasks_postgres_data
  vk_postgres_data:
    name: parsevk_vk_postgres_data
  content_postgres_data:
    name: parsevk_content_postgres_data
  moderation_postgres_data:
    name: parsevk_moderation_postgres_data
  im_postgres_data:
    name: parsevk_im_postgres_data
  prometheus_data:
    name: parsevk_prometheus_data
  grafana_data:
    name: parsevk_grafana_data
