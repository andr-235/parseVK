global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: "identity-service"
    static_configs:
      - targets: ["identity-service:8000"]

  - job_name: "tasks-service"
    static_configs:
      - targets: ["tasks-service:8000"]

  - job_name: "vk-service"
    static_configs:
      - targets: ["vk-service:8000"]

  - job_name: "content-service"
    static_configs:
      - targets: ["content-service:8000"]

  - job_name: "moderation-service"
    static_configs:
      - targets: ["moderation-service:8000"]

  - job_name: "telegram-service"
    static_configs:
      - targets: ["telegram-service:8000"]

  # TODO: uncomment when im-service is implemented
  # - job_name: "im-service"
  #   static_configs:
  #     - targets: ["im-service:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
